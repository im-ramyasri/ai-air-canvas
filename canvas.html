<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Air Canvas — Web Version</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #7c6fff;
    --accent3: #00e5cc;
    --text: #f0f0f8;
    --muted: #6b6b88;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ── Top Nav ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }
  .topbar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: var(--accent);
  }
  .topbar-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.active { background: #28c840; box-shadow: 0 0 6px #28c840; }
  .topbar-back {
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: color 0.2s;
  }
  .topbar-back:hover { color: var(--text); }

  /* ── Main Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── Canvas Container ── */
  .canvas-wrap {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #070710;
    overflow: hidden;
  }
  #videoEl {
    position: absolute;
    width: 640px; height: 480px;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.85;
  }
  #drawCanvas {
    position: absolute;
    width: 640px; height: 480px;
    pointer-events: none;
  }
  #overlayCanvas {
    position: absolute;
    width: 640px; height: 480px;
    pointer-events: none;
  }

  /* Loading overlay */
  #loadingOverlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    z-index: 20;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingText { font-size: 0.8rem; color: var(--muted); }

  /* ── Side Panel ── */
  .panel {
    width: 220px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    padding: 1.2rem;
    gap: 1.5rem;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .panel-section-title {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  /* Colors */
  .color-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.4rem;
  }
  .color-swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: white; }

  /* Brush size */
  .slider-wrap { display: flex; flex-direction: column; gap: 0.5rem; }
  .slider-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
  }

  /* Gesture indicator */
  .gesture-display {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
  }
  .gesture-icon { font-size: 2rem; margin-bottom: 0.4rem; }
  .gesture-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--accent);
  }
  .gesture-sub { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }

  /* Shape detected */
  .shape-display {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    text-align: center;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
  }
  .shape-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent3);
  }
  .shape-sub { font-size: 0.68rem; color: var(--muted); }

  /* Buttons */
  .action-btn {
    width: 100%;
    padding: 0.6rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }
  .action-btn:hover { border-color: var(--accent); background: rgba(124,111,255,0.06); }
  .action-btn.danger:hover { border-color: #ff5f57; background: rgba(255,95,87,0.06); }

  /* Permission screen */
  #permissionScreen {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    z-index: 15;
    text-align: center;
    padding: 2rem;
  }
  #permissionScreen h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
  }
  #permissionScreen p { color: var(--muted); font-size: 0.82rem; max-width: 320px; line-height: 1.7; }
  .perm-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.8rem 2rem;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .perm-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <a href="index.html" class="topbar-back">← Back</a>
  <div class="topbar-logo">AI Air Canvas</div>
  <div class="topbar-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not started</span>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Canvas Area -->
  <div class="canvas-wrap">
    <!-- Permission Screen -->
    <div id="permissionScreen">
      <div style="font-size:3rem">🎨</div>
      <h2>Allow Webcam Access</h2>
      <p>AI Air Canvas needs your webcam to detect hand gestures. Nothing is recorded or uploaded.</p>
      <button class="perm-btn" onclick="startCamera()">Enable Camera & Start</button>
    </div>

    <!-- Loading -->
    <div id="loadingOverlay" style="display:none">
      <div class="spinner"></div>
      <div id="loadingText">Loading MediaPipe model...</div>
    </div>

    <video id="videoEl" playsinline autoplay muted></video>
    <canvas id="drawCanvas" width="640" height="480"></canvas>
    <canvas id="overlayCanvas" width="640" height="480"></canvas>
  </div>

  <!-- Side Panel -->
  <div class="panel">

    <!-- Gesture -->
    <div>
      <div class="panel-section-title">Current Gesture</div>
      <div class="gesture-display">
        <div class="gesture-icon" id="gestureIcon">✋</div>
        <div class="gesture-name" id="gestureName">Waiting...</div>
        <div class="gesture-sub" id="gestureSub">Show your hand</div>
      </div>
    </div>

    <!-- Color -->
    <div>
      <div class="panel-section-title">Color</div>
      <div class="color-grid" id="colorGrid"></div>
    </div>

    <!-- Brush Size -->
    <div>
      <div class="panel-section-title">Brush Size</div>
      <div class="slider-wrap">
        <div class="slider-label"><span>Size</span><span id="brushVal">6</span></div>
        <input type="range" min="2" max="20" value="6" id="brushSlider"/>
      </div>
    </div>

    <!-- Shape -->
    <div>
      <div class="panel-section-title">Shape Detected</div>
      <div class="shape-display">
        <div class="shape-label" id="shapeLabel">—</div>
        <div class="shape-sub" id="shapeSub">Lift finger to detect</div>
      </div>
    </div>

    <!-- Actions -->
    <div>
      <div class="panel-section-title">Actions</div>
      <div style="display:flex;flex-direction:column;gap:0.5rem">
        <button class="action-btn" onclick="saveCanvas()">💾 Save PNG</button>
        <button class="action-btn danger" onclick="clearCanvas()">🗑 Clear Canvas</button>
      </div>
    </div>

  </div>
</div>

<!-- MediaPipe JS via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const PALETTE = [
  { name:"Red",    color:"#DC3232" },
  { name:"Orange", color:"#FF8C1E" },
  { name:"Yellow", color:"#DCE01E" },
  { name:"Green",  color:"#28C828" },
  { name:"Cyan",   color:"#28C8C8" },
  { name:"Blue",   color:"#284EDC" },
  { name:"Purple", color:"#B43CB4" },
  { name:"White",  color:"#F0F0F0" },
];

const SMOOTH_ALPHA       = 0.35;
const GESTURE_HOLD_FRAMES = 4;
const PALETTE_H          = 50;
const CANVAS_W           = 640;
const CANVAS_H           = 480;

// ── State ─────────────────────────────────────────────────────────────────
let selectedColor = PALETTE[0].color;
let brushSize     = 6;
let prevPoint     = null;
let currentStroke = [];
let smoothX = null, smoothY = null;
let gestureCandidate = null, gestureCandidateCount = 0, activeGesture = null;
let shapeTimer = null;

// ── Canvas Setup ──────────────────────────────────────────────────────────
const video         = document.getElementById('videoEl');
const drawCanvas    = document.getElementById('drawCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const dCtx          = drawCanvas.getContext('2d');
const oCtx          = overlayCanvas.getContext('2d');

// ── Build Color Grid ──────────────────────────────────────────────────────
const colorGrid = document.getElementById('colorGrid');
PALETTE.forEach((p, i) => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (i === 0 ? ' selected' : '');
  sw.style.background = p.color;
  sw.title = p.name;
  sw.onclick = () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    sw.classList.add('selected');
    selectedColor = p.color;
  };
  colorGrid.appendChild(sw);
});

// Brush slider
const brushSlider = document.getElementById('brushSlider');
brushSlider.oninput = () => {
  brushSize = parseInt(brushSlider.value);
  document.getElementById('brushVal').textContent = brushSize;
};

// ── Smoothing ─────────────────────────────────────────────────────────────
function smooth(x, y) {
  if (smoothX === null) { smoothX = x; smoothY = y; }
  smoothX = SMOOTH_ALPHA * x + (1 - SMOOTH_ALPHA) * smoothX;
  smoothY = SMOOTH_ALPHA * y + (1 - SMOOTH_ALPHA) * smoothY;
  return [Math.round(smoothX), Math.round(smoothY)];
}
function resetSmooth() { smoothX = null; smoothY = null; }

// ── Gesture Debounce ──────────────────────────────────────────────────────
function debounce(gesture) {
  if (gesture === gestureCandidate) {
    gestureCandidateCount++;
  } else {
    gestureCandidate = gesture;
    gestureCandidateCount = 1;
  }
  if (gestureCandidateCount >= GESTURE_HOLD_FRAMES) {
    activeGesture = gestureCandidate;
  }
  return activeGesture;
}

// ── Finger States ─────────────────────────────────────────────────────────
function getFingerStates(lm, handedness) {
  const tips = [4, 8, 12, 16, 20];
  const pips = [3, 6, 10, 14, 18];
  const f = [];
  f.push(handedness === 'Right' ? (lm[4].x < lm[3].x ? 1:0) : (lm[4].x > lm[3].x ? 1:0));
  for (let i = 1; i < 5; i++) f.push(lm[tips[i]].y < lm[pips[i]].y ? 1 : 0);
  return f;
}

function classifyGesture(f, sy) {
  if (f[1]+f[2]+f[3]+f[4] >= 4) return 'CLEAR';
  if (sy < PALETTE_H)            return 'COLOR_SELECT';
  if (f[1]===1 && f[2]===1 && f[3]===0 && f[4]===0) return 'ERASE';
  if (f[1]===1 && f[2]===0 && f[3]===0 && f[4]===0) return 'DRAW';
  return 'IDLE';
}

// ── UI Updates ────────────────────────────────────────────────────────────
const GESTURE_MAP = {
  DRAW:         { icon:'✏️', name:'Drawing',      sub:'Index finger up'   },
  ERASE:        { icon:'✌️', name:'Erasing',      sub:'Peace sign'         },
  CLEAR:        { icon:'🖐️', name:'Clear',        sub:'Open palm'          },
  COLOR_SELECT: { icon:'🎨', name:'Color Select', sub:'Finger in top bar'  },
  IDLE:         { icon:'🤚', name:'Idle',         sub:'No action'          },
  NONE:         { icon:'✋', name:'Waiting...',   sub:'Show your hand'     },
};

function updateGestureUI(key) {
  const g = GESTURE_MAP[key] || GESTURE_MAP.NONE;
  document.getElementById('gestureIcon').textContent  = g.icon;
  document.getElementById('gestureName').textContent  = g.name;
  document.getElementById('gestureSub').textContent   = g.sub;
}

function showShape(label) {
  document.getElementById('shapeLabel').textContent = label || '—';
  document.getElementById('shapeSub').textContent   = label ? 'Shape recognized!' : 'Lift finger to detect';
  if (shapeTimer) clearTimeout(shapeTimer);
  if (label) shapeTimer = setTimeout(() => {
    document.getElementById('shapeLabel').textContent = '—';
    document.getElementById('shapeSub').textContent   = 'Lift finger to detect';
  }, 3000);
}

// ── Draw Palette on Overlay ───────────────────────────────────────────────
function drawPaletteBar() {
  const blockW = (CANVAS_W - 80) / PALETTE.length;
  oCtx.fillStyle = '#1a1a25';
  oCtx.fillRect(0, 0, CANVAS_W, PALETTE_H);
  PALETTE.forEach((p, i) => {
    const x = i * blockW;
    oCtx.fillStyle = p.color;
    oCtx.beginPath();
    oCtx.roundRect(x + 4, 4, blockW - 8, PALETTE_H - 8, 4);
    oCtx.fill();
    if (p.color === selectedColor) {
      oCtx.strokeStyle = 'white';
      oCtx.lineWidth = 2;
      oCtx.beginPath();
      oCtx.roundRect(x + 2, 2, blockW - 4, PALETTE_H - 4, 4);
      oCtx.stroke();
    }
  });
  // Clear button
  oCtx.fillStyle = '#3a3a4a';
  oCtx.beginPath();
  oCtx.roundRect(CANVAS_W - 76, 4, 72, PALETTE_H - 8, 4);
  oCtx.fill();
  oCtx.fillStyle = '#aaa';
  oCtx.font = '11px DM Mono, monospace';
  oCtx.fillText('CLEAR', CANVAS_W - 68, PALETTE_H - 14);
}

function drawFingertip(x, y) {
  oCtx.beginPath();
  oCtx.arc(x, y, 10, 0, Math.PI * 2);
  oCtx.fillStyle = selectedColor;
  oCtx.fill();
  oCtx.strokeStyle = 'white';
  oCtx.lineWidth = 1.5;
  oCtx.stroke();
}

// ── Simple Shape Recognizer (JS port) ────────────────────────────────────
function recognizeShape(points) {
  if (points.length < 8) return '';
  const xs = points.map(p => p[0]), ys = points.map(p => p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const w = maxX - minX, h = maxY - minY;
  if (Math.max(w, h) < 15) return 'Dot';

  // Perimeter from stroke length
  let perim = 0;
  for (let i = 1; i < points.length; i++) {
    perim += Math.hypot(points[i][0]-points[i-1][0], points[i][1]-points[i-1][1]);
  }

  // Close gap check
  const startEndDist = Math.hypot(points[0][0]-points[points.length-1][0], points[0][1]-points[points.length-1][1]);
  const closed = startEndDist < Math.max(w, h) * 0.25;
  if (closed) perim += startEndDist;

  const area = w * h * 0.785; // rough
  const circ = (4 * Math.PI * area) / (perim * perim);
  const ar   = w / (h || 1);

  // Count direction changes (vertices)
  const step = Math.max(1, Math.floor(points.length / 30));
  const angles = [];
  for (let i = step; i < points.length - step; i += step) {
    const dx = points[i+step][0] - points[i][0];
    const dy = points[i+step][1] - points[i][1];
    angles.push(Math.atan2(dy, dx));
  }
  let corners = 0;
  for (let i = 1; i < angles.length; i++) {
    let d = Math.abs(angles[i] - angles[i-1]);
    if (d > Math.PI) d = 2*Math.PI - d;
    if (d > 0.6) corners++;
  }

  // Zigzag detection
  let reversals = 0;
  const dxs = points.slice(1).map((p,i) => p[0]-points[i][0]);
  let prevSign = Math.sign(dxs[0]);
  for (const dx of dxs) {
    const s = Math.sign(dx);
    if (s !== 0 && s !== prevSign) { reversals++; prevSign = s; }
  }

  if (reversals >= 6 && !closed) return 'Zigzag ⚡';
  if ((ar > 5 || ar < 0.2) && !closed) return 'Line —';
  if (circ > 0.72 && ar > 0.6 && ar < 1.6) return 'Circle ⭕';
  if (circ > 0.55 && (ar > 1.6 || ar < 0.6)) return 'Ellipse 〇';
  if (corners <= 3 && closed) return 'Triangle △';
  if (corners <= 4 && closed) {
    return (ar > 0.8 && ar < 1.25) ? 'Square □' : 'Rectangle ▭';
  }
  if (corners <= 5 && closed) return 'Pentagon ⬠';
  if (corners <= 6 && closed) return 'Hexagon ⬡';
  if (corners >= 8 && closed) return 'Star ⭐';
  return 'Free Form ✏';
}

// ── Drawing Logic ─────────────────────────────────────────────────────────
function clearCanvas() {
  dCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  currentStroke = [];
  showShape('');
}

function saveCanvas() {
  const out = document.createElement('canvas');
  out.width = CANVAS_W; out.height = CANVAS_H;
  const ctx = out.getContext('2d');
  ctx.drawImage(drawCanvas, 0, 0);
  const a = document.createElement('a');
  a.download = `air_canvas_${Date.now()}.png`;
  a.href = out.toDataURL('image/png');
  a.click();
}

// ── MediaPipe Integration ─────────────────────────────────────────────────
async function startCamera() {
  document.getElementById('permissionScreen').style.display = 'none';
  document.getElementById('loadingOverlay').style.display  = 'flex';

  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7,
  });

  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: CANVAS_W,
    height: CANVAS_H,
  });

  camera.start().then(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('statusText').textContent = 'Live';
  });
}

function onResults(results) {
  // Clear overlay
  oCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawPaletteBar();

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    updateGestureUI('NONE');
    if (currentStroke.length > 8) {
      showShape(recognizeShape(currentStroke));
      currentStroke = [];
    }
    prevPoint = null;
    resetSmooth();
    return;
  }

  const lm          = results.multiHandLandmarks[0];
  const handedness  = results.multiHandedness[0].label; // "Left"/"Right"
  const fingers     = getFingerStates(lm, handedness);

  // Flip X to match the CSS mirrored video feed
  const rawX = CANVAS_W - Math.round(lm[8].x * CANVAS_W);
  const rawY = Math.round(lm[8].y * CANVAS_H);
  const [sx, sy] = smooth(
    Math.max(0, Math.min(rawX, CANVAS_W-1)),
    Math.max(0, Math.min(rawY, CANVAS_H-1))
  );

  const rawGesture = classifyGesture(fingers, sy);
  const gesture    = debounce(rawGesture);

  drawFingertip(sx, sy);
  drawHandSkeleton(lm);
  updateGestureUI(gesture || 'NONE');

  if (gesture === 'CLEAR') {
    clearCanvas();
    prevPoint = null;
    resetSmooth();

  } else if (gesture === 'COLOR_SELECT') {
    const blockW = (CANVAS_W - 80) / PALETTE.length;
    if (sx >= CANVAS_W - 76) {
      clearCanvas();
    } else {
      const idx = Math.min(Math.floor(sx / blockW), PALETTE.length - 1);
      selectedColor = PALETTE[idx].color;
      document.querySelectorAll('.color-swatch').forEach((sw, i) => {
        sw.classList.toggle('selected', i === idx);
      });
    }
    prevPoint = null;
    resetSmooth();

  } else if (gesture === 'ERASE') {
    if (currentStroke.length > 8) {
      showShape(recognizeShape(currentStroke));
      currentStroke = [];
    }
    if (prevPoint) {
      dCtx.globalCompositeOperation = 'destination-out';
      dCtx.beginPath();
      dCtx.arc(sx, sy, 20, 0, Math.PI*2);
      dCtx.fill();
      dCtx.globalCompositeOperation = 'source-over';
    }
    prevPoint = [sx, sy];

  } else if (gesture === 'DRAW') {
    if (prevPoint) {
      dCtx.strokeStyle = selectedColor;
      dCtx.lineWidth   = brushSize;
      dCtx.lineCap     = 'round';
      dCtx.lineJoin    = 'round';
      dCtx.beginPath();
      dCtx.moveTo(prevPoint[0], prevPoint[1]);
      dCtx.lineTo(sx, sy);
      dCtx.stroke();
      currentStroke.push([sx, sy]);
    }
    prevPoint = [sx, sy];

  } else {
    if (currentStroke.length > 8) {
      showShape(recognizeShape(currentStroke));
      currentStroke = [];
    }
    prevPoint = null;
    resetSmooth();
  }
}

function drawHandSkeleton(lm) {
  const connections = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],[0,17]
  ];
  // Flip x to match mirrored video
  const px = p => [CANVAS_W - p.x * CANVAS_W, p.y * CANVAS_H];
  oCtx.strokeStyle = 'rgba(0,229,204,0.6)';
  oCtx.lineWidth = 2;
  connections.forEach(([a, b]) => {
    const [ax, ay] = px(lm[a]);
    const [bx, by] = px(lm[b]);
    oCtx.beginPath();
    oCtx.moveTo(ax, ay);
    oCtx.lineTo(bx, by);
    oCtx.stroke();
  });
  lm.forEach(p => {
    const [x, y] = px(p);
    oCtx.beginPath();
    oCtx.arc(x, y, 3, 0, Math.PI*2);
    oCtx.fillStyle = 'white';
    oCtx.fill();
  });
}

// Draw initial palette
drawPaletteBar();
